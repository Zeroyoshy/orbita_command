services:
  - type: web
    name: orbita-command
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4
    healthCheckPath: /healthz
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: SESSION_TIMEOUT_MINUTES
        value: "30"
      - key: ENFORCE_HTTPS
        value: "true"
      - key: LOG_TO_FILE
        value: "false"
